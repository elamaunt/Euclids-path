            16. Finite и H дают False: 16. Finite and H yield False
            17. Закон оплаты и дефект: 17. The payment law and the defect
            IV. Финальная редукция twin-линии: IV. The final reduction of the twin line
            18. SNOL — редукция к rank-1: 18. SNOL — reduction to rank-1
            19. Old-peel: 19. Old-peel
            20. NOPSL: 20. NOPSL
            21. Дихотомия регенерации: 21. The regeneration dichotomy
            22. Снятие плотности и чётности: 22. Lifting density and parity
            23. Clean-boundary split: 23. The clean-boundary split
            24. Декомпозиция boundary и узел: 24. The boundary decomposition and the node
            25. Rigid closure: 25. Rigid closure
            V. Product-core rank descent: V. Product-core rank descent
            26. Separating scale: 26. The separating scale
            27. Product-core: 27. Product-core
            28. Факторизация — RankNode: 28. Factorization — RankNode

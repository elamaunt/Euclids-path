            45. Софи Жермен: 45. Sophie Germain
            46. Гольдбах и Лежандр: 46. Goldbach and Legendre
            47. Совершенные числа: 47. Perfect numbers
            48. Числа Ферма: 48. Fermat numbers
            VIII. Геометрия и кода: VIII. Geometry and coda
            49. Геометрия пути: 49. The geometry of the path
            50. Кода: 50. Coda
            Приложения и поздние фронты: Appendices & later fronts

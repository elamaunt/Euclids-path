      - 06. Нет хода назад: 06_NoBackward.md
      - 07. Cubic squeeze: 07_Squeeze.md
      - 08. Ограниченный аддитивный цикл: 08_BK.md
      - 09. Factor-repeat rigidity: 09_Cycle.md
  - II. Редукция к близнецам:

            09. Factor-repeat rigidity: 09. Factor-repeat rigidity
            II. Редукция к близнецам: II. Reduction to twins
            10. Survivor значит twin: 10. Survivor means twin
            11. Близнецы из блочного ядра: 11. Twins from the block core

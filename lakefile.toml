# Lake-пакет консолидации Euclids-path.
# ВНИМАНИЕ: на момент создания Lean/lake не установлены, проект НЕ компилировался.
# Перед первой сборкой:
#   1) установить elan/lean/lake;
#   2) выровнять `lean-toolchain` под выбранный коммит mathlib
#      (проще всего скопировать lean-toolchain из нужного коммита mathlib4);
#   3) `lake update` затем `lake build`.
name = "EuclidsPath"
defaultTargets = ["EuclidsPath"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "master"

[[lean_lib]]
name = "EuclidsPath"
